# .github/workflows/tree.yml
name: 📁 List Repository Tree

on:
  workflow_dispatch:
    inputs:
      show_sizes:
        description: 'Show file sizes'
        required: false
        default: false
        type: boolean

jobs:
  list-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OmniOS repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tree command
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Display full repository tree
        run: tree -a -I '.git' --charset=utf-8

      - name: Display tree with file sizes (if requested)
        if: ${{ inputs.show_sizes == 'true' }}
        run: tree -a -s -I '.git' --charset=utf-8

      - name: List all files with paths
        run: find . -not -path './.git/*' -not -path './.git' | sort

      - name: Count files and directories
        run: |
          echo "=== OmniOS Repository Stats ==="
          echo "Total files: $(find . -not -path './.git/*' -type f | wc -l)"
          echo "Total directories: $(find . -not -path './.git/*' -type d | wc -l)"
          echo "Assembly files: $(find . -name '*.asm' | wc -l)"
          echo "C files: $(find . -name '*.c' | wc -l)"
          echo "C++ files: $(find . -name '*.cpp' | wc -l)"
          echo "Header files: $(find . -name '*.h' -o -name '*.hpp' | wc -l)"