# tree.yml - GitHub Actions workflow to list repository structure
name: List Repository Tree

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  list-tree:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OmniOS repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install tree command
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Display full repository tree
        run: tree -a -I '.git' --charset=utf-8

      - name: Display tree with file sizes
        run: tree -a -s -I '.git' --charset=utf-8

      - name: List all files with paths
        run: find . -not -path './.git/*' -not -path './.git' | sort