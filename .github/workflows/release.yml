name: Release OmniOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        default: '0.1.0'
      release_name:
        description: 'Release title'
        required: true
        default: 'OmniOS v0.1.0'
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'true'
        type: boolean
      create_qcow2:
        description: 'Include QCOW2 image'
        required: false
        default: 'true'
        type: boolean
      create_vdi:
        description: 'Include VDI image (VirtualBox)'
        required: false
        default: 'false'
        type: boolean
      create_vmdk:
        description: 'Include VMDK image (VMware)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    env:
      TOOLCHAIN_DIR: /home/runner/.toolchains
      TOOLCHAIN_BIN: /home/runner/.toolchains/i686-elf/bin
      BINUTILS_VERSION: '2.37'
      GCC_VERSION: '11.2.0'
      LIBGUESTFS_BACKEND: direct

    steps:
      # ──────────────────────────────────────────────
      #  1. Checkout
      # ──────────────────────────────────────────────
      - name: Checkout OmniOS
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      #  2. Dependencies
      # ──────────────────────────────────────────────
      - name: Install all dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            bison \
            flex \
            libgmp3-dev \
            libmpc-dev \
            libmpfr-dev \
            texinfo \
            nasm \
            mtools \
            qemu-system-x86 \
            qemu-utils \
            python3-pip \
            wget \
            xorriso \
            scons \
            libguestfs-tools \
            linux-image-generic \
            zip
          pip3 install sh --break-system-packages
          sudo chmod +r /boot/vmlinuz-* || true

      # ──────────────────────────────────────────────
      #  3. Toolchain cache
      # ──────────────────────────────────────────────
      - name: Cache cross-compiler toolchain
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: ~/.toolchains
          key: ${{ runner.os }}-i686-elf-binutils-${{ env.BINUTILS_VERSION }}-gcc-${{ env.GCC_VERSION }}-v2

      - name: Build cross-compiler toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p $TOOLCHAIN_DIR
          chmod +x scripts/setup_toolchain.sh
          BINUTILS_VERSION=${{ env.BINUTILS_VERSION }} \
          GCC_VERSION=${{ env.GCC_VERSION }} \
            bash scripts/setup_toolchain.sh $TOOLCHAIN_DIR

      - name: Setup PATH
        run: echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH

      # ──────────────────────────────────────────────
      #  4. Build release
      # ──────────────────────────────────────────────
      - name: Build OmniOS (release)
        run: |
          sudo -E env "PATH=$TOOLCHAIN_BIN:$PATH" \
            scons -j$(nproc) \
              config=release \
              toolchain=$TOOLCHAIN_DIR \
              arch=i686 \
              imageType=disk \
              imageFS=fat32 \
              imageSize=250m

      # ──────────────────────────────────────────────
      #  5. Prepare release artifacts
      # ──────────────────────────────────────────────
      - name: Prepare release directory
        run: |
          mkdir -p release
          VER="${{ inputs.version }}"

          RAW_IMG=$(find build/ -name "*.img" | head -1)
          KERNEL_ELF=$(find build/ -name "kernel.elf" | head -1)

          if [ -z "$RAW_IMG" ]; then
            echo "ERROR: No disk image found!"
            exit 1
          fi

          cp "$RAW_IMG" "release/omnios-${VER}.img"

          if [ -n "$KERNEL_ELF" ]; then
            cp "$KERNEL_ELF" "release/omnios-${VER}-kernel.elf"
          fi

      - name: Create QCOW2 image
        if: ${{ inputs.create_qcow2 == 'true' }}
        run: |
          VER="${{ inputs.version }}"
          qemu-img convert -f raw -O qcow2 \
            "release/omnios-${VER}.img" \
            "release/omnios-${VER}.qcow2"
          qemu-img info "release/omnios-${VER}.qcow2"

      - name: Create VDI image
        if: ${{ inputs.create_vdi == 'true' }}
        run: |
          VER="${{ inputs.version }}"
          qemu-img convert -f raw -O vdi \
            "release/omnios-${VER}.img" \
            "release/omnios-${VER}.vdi"

      - name: Create VMDK image
        if: ${{ inputs.create_vmdk == 'true' }}
        run: |
          VER="${{ inputs.version }}"
          qemu-img convert -f raw -O vmdk \
            "release/omnios-${VER}.img" \
            "release/omnios-${VER}.vmdk"

      # ──────────────────────────────────────────────
      #  6. Checksums + docs
      # ──────────────────────────────────────────────
      - name: Generate checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate README
        run: |
          VER="${{ inputs.version }}"
          cat > release/README.txt << EOF
          ================================================================
                         OmniOS ${VER}
                    Terminal Operating System
          ================================================================

          QUICK START (QEMU)
          ----------------------------------------------------------------

            Using RAW image:
              qemu-system-i386 -drive format=raw,file=omnios-${VER}.img -m 256M

            Using QCOW2:
              qemu-system-i386 -drive format=qcow2,file=omnios-${VER}.qcow2 -m 256M

            With serial output:
              qemu-system-i386 -drive format=raw,file=omnios-${VER}.img -m 256M -serial stdio

            With GDB debug:
              qemu-system-i386 -drive format=raw,file=omnios-${VER}.img -m 256M -s -S

              Then: gdb omnios-${VER}-kernel.elf
                    (gdb) target remote :1234
                    (gdb) continue

          QUICK START (VirtualBox)
          ----------------------------------------------------------------

            1. New VM -> Type: Other, Version: Other/Unknown
            2. RAM: 256MB
            3. Use existing disk -> omnios-${VER}.vdi
            4. Settings -> System -> uncheck Enable EFI
            5. Start

          QUICK START (VMware)
          ----------------------------------------------------------------

            1. New VM -> Guest OS: Other
            2. RAM: 256MB
            3. Use existing disk -> omnios-${VER}.vmdk
            4. Ensure BIOS boot (not UEFI)
            5. Power on

          SHELL COMMANDS
          ----------------------------------------------------------------

            help              Show all commands
            clear / cls       Clear screen
            echo <text>       Print text
            version           Show version
            sysinfo           System information
            meminfo           Memory layout
            cpuinfo           CPU information
            history           Command history
            color <0-7>       Change colour scheme
            calc <expr>       Calculator (e.g. calc 10+3)
            ascii             ASCII table
            hex <addr> [n]    Hex dump memory
            peek <addr>       Read byte
            poke <addr> <v>   Write byte
            uptime            System ticks
            banner            Redraw banner
            reboot            Reboot system
            halt              Halt CPU
            panic             Test kernel panic

          SYSTEM INFO
          ----------------------------------------------------------------

            Architecture:   x86 (i686) 32-bit Protected Mode
            Boot:           Stage1 MBR + Stage2 FAT32 ELF loader
            Display:        VGA text mode 80x25 (16 colours)
            Keyboard:       PS/2 IRQ1 with line editing
            Toolchain:      i686-elf-gcc 11.2.0, NASM, SCons

          SOURCE CODE
          ----------------------------------------------------------------

            https://github.com/${{ github.repository }}
            Based on: https://github.com/nanobyte-dev/nanobyte_os

          EOF

      # ──────────────────────────────────────────────
      #  7. Zip
      # ──────────────────────────────────────────────
      - name: Create release zip
        run: |
          VER="${{ inputs.version }}"
          cd release
          zip -9 "../omnios-${VER}-all.zip" *
          cd ..
          ls -lah "omnios-${VER}-all.zip"

      # ──────────────────────────────────────────────
      #  8. Smoke test
      # ──────────────────────────────────────────────
      - name: Smoke test
        run: |
          VER="${{ inputs.version }}"
          timeout 10 qemu-system-i386 \
            -drive format=raw,file="release/omnios-${VER}.img" \
            -display none \
            -serial stdio \
            -no-reboot \
            -m 256M || true

      # ──────────────────────────────────────────────
      #  9. Build file list for release
      # ──────────────────────────────────────────────
      - name: Build upload file list
        id: files
        run: |
          VER="${{ inputs.version }}"
          FILES=""
          
          # Always include these
          FILES="release/omnios-${VER}.img"
          FILES="${FILES}\nrelease/SHA256SUMS.txt"
          FILES="${FILES}\nrelease/README.txt"
          FILES="${FILES}\nomnios-${VER}-all.zip"
          
          # Kernel ELF
          if [ -f "release/omnios-${VER}-kernel.elf" ]; then
            FILES="${FILES}\nrelease/omnios-${VER}-kernel.elf"
          fi
          
          # Optional formats
          if [ -f "release/omnios-${VER}.qcow2" ]; then
            FILES="${FILES}\nrelease/omnios-${VER}.qcow2"
          fi
          if [ -f "release/omnios-${VER}.vdi" ]; then
            FILES="${FILES}\nrelease/omnios-${VER}.vdi"
          fi
          if [ -f "release/omnios-${VER}.vmdk" ]; then
            FILES="${FILES}\nrelease/omnios-${VER}.vmdk"
          fi
          
          echo -e "$FILES" > /tmp/release_files.txt
          echo "=== Files to upload ==="
          cat /tmp/release_files.txt

      # ──────────────────────────────────────────────
      #  10. Generate release notes
      # ──────────────────────────────────────────────
      - name: Generate release notes
        run: |
          VER="${{ inputs.version }}"
          cat > /tmp/release_notes.md << NOTES
          ## OmniOS v${VER}

          **Terminal Operating System** built on the nanobyte_os kernel.

          ### Quick Start

          \`\`\`bash
          # QEMU (RAW)
          qemu-system-i386 -drive format=raw,file=omnios-${VER}.img -m 256M

          # QEMU (QCOW2)
          qemu-system-i386 -drive format=qcow2,file=omnios-${VER}.qcow2 -m 256M
          \`\`\`

          ### Downloads

          | File | Format | Use With |
          |------|--------|----------|
          | \`omnios-${VER}.img\` | RAW | QEMU, dd to USB |
          | \`omnios-${VER}.qcow2\` | QCOW2 | QEMU (snapshots) |
          | \`omnios-${VER}.vdi\` | VDI | VirtualBox |
          | \`omnios-${VER}.vmdk\` | VMDK | VMware |
          | \`omnios-${VER}-kernel.elf\` | ELF | GDB debugging |
          | \`omnios-${VER}-all.zip\` | ZIP | Everything in one file |

          > Only selected formats are included in each release.

          ### Shell Commands

          \`help\` \`clear\` \`echo\` \`version\` \`sysinfo\` \`meminfo\` \`cpuinfo\`
          \`history\` \`color\` \`calc\` \`ascii\` \`hex\` \`peek\` \`poke\`
          \`uptime\` \`banner\` \`reboot\` \`halt\` \`panic\`

          ### System

          - **Arch:** x86 (i686) 32-bit Protected Mode
          - **Boot:** Stage1 MBR + Stage2 FAT32 ELF loader
          - **Display:** VGA text 80x25 with 16 colours
          - **Input:** PS/2 keyboard with line editing + history

          ---
          *Checksums in \`SHA256SUMS.txt\`*
          NOTES

      # ──────────────────────────────────────────────
      #  11. Create GitHub Release (only existing files)
      # ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: ${{ inputs.release_name }}
          body_path: /tmp/release_notes.md
          prerelease: ${{ inputs.prerelease }}
          make_latest: true
          files: |
            release/omnios-${{ inputs.version }}.img
            release/omnios-${{ inputs.version }}-kernel.elf
            release/SHA256SUMS.txt
            release/README.txt
            omnios-${{ inputs.version }}-all.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload optional QCOW2
        if: ${{ inputs.create_qcow2 == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: release/omnios-${{ inputs.version }}.qcow2
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload optional VDI
        if: ${{ inputs.create_vdi == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: release/omnios-${{ inputs.version }}.vdi
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload optional VMDK
        if: ${{ inputs.create_vmdk == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: release/omnios-${{ inputs.version }}.vmdk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ──────────────────────────────────────────────
      #  12. Summary
      # ──────────────────────────────────────────────
      - name: Release summary
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║   OmniOS ${{ inputs.version }} Released!              ║"
          echo "╚══════════════════════════════════════════╝"
          echo ""
          echo "  Tag:         v${{ inputs.version }}"
          echo "  Title:       ${{ inputs.release_name }}"
          echo "  Pre-release: ${{ inputs.prerelease }}"
          echo "  QCOW2:       ${{ inputs.create_qcow2 }}"
          echo "  VDI:         ${{ inputs.create_vdi }}"
          echo "  VMDK:        ${{ inputs.create_vmdk }}"
          echo ""
          echo "  URL: https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }}"