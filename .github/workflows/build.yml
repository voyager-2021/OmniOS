name: Build OmniOS

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      run_tests:
        description: 'Run QEMU headless test after build'
        required: false
        default: false
        type: boolean
      rebuild_toolchain:
        description: 'Force rebuild cross-compiler toolchain'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TOOLCHAIN_DIR: /home/runner/.toolchains
      TOOLCHAIN_BIN: /home/runner/.toolchains/i686-elf/bin
      BINUTILS_VERSION: '2.37'
      GCC_VERSION: '11.2.0'
      LIBGUESTFS_BACKEND: direct

    steps:
      # ──────────────────────────────────────────────
      #  1. Checkout
      # ──────────────────────────────────────────────
      - name: Checkout OmniOS
        uses: actions/checkout@v4

      # ──────────────────────────────────────────────
      #  2. System + Python dependencies (single step)
      # ──────────────────────────────────────────────
      - name: Install all dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            bison \
            flex \
            libgmp3-dev \
            libmpc-dev \
            libmpfr-dev \
            texinfo \
            nasm \
            mtools \
            qemu-system-x86 \
            python3-pip \
            wget \
            xorriso \
            scons \
            libguestfs-tools \
            linux-image-generic
          pip3 install sh --break-system-packages
          sudo chmod +r /boot/vmlinuz-* || true

      # ──────────────────────────────────────────────
      #  3. Toolchain cache (saves ~25 min on hits)
      # ──────────────────────────────────────────────
      - name: Cache cross-compiler toolchain
        uses: actions/cache@v4
        id: cache-toolchain
        if: ${{ inputs.rebuild_toolchain != 'true' }}
        with:
          path: ~/.toolchains
          key: ${{ runner.os }}-i686-elf-binutils-${{ env.BINUTILS_VERSION }}-gcc-${{ env.GCC_VERSION }}-v2

      # ──────────────────────────────────────────────
      #  4. Build toolchain only if not cached
      # ──────────────────────────────────────────────
      - name: Build cross-compiler toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true' || inputs.rebuild_toolchain == 'true'
        run: |
          mkdir -p $TOOLCHAIN_DIR
          chmod +x scripts/setup_toolchain.sh
          BINUTILS_VERSION=${{ env.BINUTILS_VERSION }} \
          GCC_VERSION=${{ env.GCC_VERSION }} \
            bash scripts/setup_toolchain.sh $TOOLCHAIN_DIR

      # ──────────────────────────────────────────────
      #  5. PATH + verify
      # ──────────────────────────────────────────────
      - name: Setup PATH and verify
        run: |
          echo "$TOOLCHAIN_BIN" >> $GITHUB_PATH
          echo "=== Toolchain ==="
          $TOOLCHAIN_BIN/i686-elf-gcc --version | head -1
          echo "=== NASM ==="
          nasm --version
          echo "=== SCons ==="
          scons --version | head -2
          echo "=== guestmount ==="
          guestmount --version || echo "guestmount check done"

      # ──────────────────────────────────────────────
      #  6. Build OmniOS
      # ──────────────────────────────────────────────
      - name: Build OmniOS
        run: |
          sudo -E env "PATH=$TOOLCHAIN_BIN:$PATH" \
            scons -j$(nproc) \
              config=${{ inputs.build_type }} \
              toolchain=$TOOLCHAIN_DIR \
              arch=i686 \
              imageType=disk \
              imageFS=fat32 \
              imageSize=250m

      # ──────────────────────────────────────────────
      #  7. Results
      # ──────────────────────────────────────────────
      - name: Build results
        if: always()
        run: |
          echo "========================================"
          echo "  OmniOS Build Results"
          echo "========================================"
          echo ""
          echo "--- Disk Images ---"
          find . -name "*.img" | grep -v '.git' | while read f; do
            echo "  $(ls -lah "$f" | awk '{print $5, $9}')"
          done
          echo ""
          echo "--- Kernel ELF ---"
          find . -name "*.elf" | grep -v '.git' | while read f; do
            echo "  $(ls -lah "$f" | awk '{print $5, $9}')"
          done
          echo ""
          echo "--- All Build Artifacts ---"
          find build/ -type f | sort 2>/dev/null | head -50 || echo "No build dir"
          echo "========================================"

      # ──────────────────────────────────────────────
      #  8. QEMU test (optional)
      # ──────────────────────────────────────────────
      - name: Run QEMU headless test
        if: ${{ inputs.run_tests == 'true' }}
        run: |
          IMG=$(find . -name "*.img" | grep -v '.git' | head -1)
          [ -z "$IMG" ] && echo "No image found" && exit 0
          echo "Testing: $IMG ($(ls -lah "$IMG" | awk '{print $5}'))"
          timeout 10 qemu-system-i386 \
            -drive format=raw,file="$IMG" \
            -display none \
            -serial stdio \
            -no-reboot \
            -m 32M || true

      # ──────────────────────────────────────────────
      #  9. Upload artifacts
      # ──────────────────────────────────────────────
      - name: Upload OmniOS disk image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: omnios-${{ inputs.build_type }}
          path: |
            build/**/*.img
            build/**/*.elf
          retention-days: 30
          if-no-files-found: warn