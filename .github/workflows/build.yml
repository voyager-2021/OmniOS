name: Build OmniOS

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      run_tests:
        description: 'Run QEMU headless test after build'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout OmniOS
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential \
            bison \
            flex \
            libgmp3-dev \
            libmpc-dev \
            libmpfr-dev \
            texinfo \
            nasm \
            mtools \
            qemu-system-x86 \
            python3-pip \
            wget \
            curl \
            git \
            xorriso \
            scons \
            libguestfs-tools \
            linux-image-generic

      - name: Install Python dependencies
        run: |
          pip3 install sh --break-system-packages

      - name: Fix guestfs permissions
        run: |
          # libguestfs needs a kernel it can read
          sudo chmod +r /boot/vmlinuz-* || true
          # Set LIBGUESTFS_BACKEND to direct so it works in CI
          echo "LIBGUESTFS_BACKEND=direct" >> $GITHUB_ENV
          # Test guestfs works
          sudo -E guestfish --version || true
          guestmount --version || true

      - name: Cache cross-compiler toolchain
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: ~/.toolchains
          key: ${{ runner.os }}-i686-elf-gcc-11.2.0-binutils-2.37-v1

      - name: Create toolchains directory
        run: mkdir -p ~/.toolchains

      - name: Build cross-compiler toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/setup_toolchain.sh
          BINUTILS_VERSION=2.37 GCC_VERSION=11.2.0 \
            bash scripts/setup_toolchain.sh ~/.toolchains

      - name: Add toolchain to PATH
        run: echo "$HOME/.toolchains/i686-elf/bin" >> $GITHUB_PATH

      - name: Verify toolchain
        run: |
          i686-elf-gcc --version
          i686-elf-ld --version
          nasm --version
          scons --version

      - name: Build OmniOS
        run: |
          echo "=== Starting OmniOS build ==="
          sudo -E scons -j$(nproc) \
            config=${{ inputs.build_type }} \
            toolchain=$HOME/.toolchains \
            arch=i686 \
            imageType=disk \
            imageFS=fat32 \
            imageSize=250m
        env:
          LIBGUESTFS_BACKEND: direct
          PATH: /home/runner/.toolchains/i686-elf/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

      - name: List build artifacts
        run: |
          echo "=== Build directory ==="
          find build/ -type f | sort 2>/dev/null || echo "No build dir"
          echo ""
          echo "=== Disk images ==="
          find . -name "*.img" -o -name "*.iso" | grep -v '.git' | sort
          echo ""
          echo "=== ELF binaries ==="
          find . -name "*.elf" | grep -v '.git' | sort
          echo ""
          echo "=== Sizes ==="
          find . \( -name "*.img" -o -name "*.iso" \) \
            | grep -v '.git' \
            | xargs ls -lah 2>/dev/null || echo "No images"

      - name: Run QEMU headless test
        if: ${{ inputs.run_tests == 'true' }}
        run: |
          IMG=$(find . -name "*.img" | grep -v '.git' | head -1)
          if [ -z "$IMG" ]; then
            echo "No disk image found"
            exit 0
          fi
          echo "Testing: $IMG"
          timeout 10 qemu-system-i386 \
            -drive format=raw,file="$IMG" \
            -display none \
            -serial stdio \
            -no-reboot \
            -m 32M || true

      - name: Upload disk image
        uses: actions/upload-artifact@v4
        with:
          name: omnios-${{ inputs.build_type }}-image
          path: |
            **/*.img
            **/*.iso
          retention-days: 14
          if-no-files-found: warn

      - name: Upload kernel ELF
        uses: actions/upload-artifact@v4
        with:
          name: omnios-${{ inputs.build_type }}-kernel
          path: build/**/*.elf
          retention-days: 14
          if-no-files-found: warn